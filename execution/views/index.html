<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Um Hello World moderno e responsivo preparado para deploy.">
    <title>Hello World - Deploy Ready</title>
    <!-- Adicionando Google Fonts para uma tipografia moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary-accent: #38bdf8;
            --secondary-accent: #818cf8;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Background subtle radial gradient */
            background-image: radial-gradient(circle at top right, rgba(56, 189, 248, 0.15), transparent 50%),
                              radial-gradient(circle at bottom left, rgba(129, 140, 248, 0.15), transparent 50%);
        }

        .container {
            text-align: center;
            padding: 4rem 5rem;
            border-radius: 24px;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.15);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 4s ease infinite alternate;
            letter-spacing: -0.05em;
        }

        p {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-top: 1.5rem;
            margin-bottom: 0;
            font-weight: 400;
            letter-spacing: 0.01em;
            opacity: 0;
            animation: fadeIn 1s ease 0.5s forwards;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
            padding: 6px 16px;
            border-radius: 9999px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            font-size: 0.875rem;
            color: #34d399;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #34d399;
            border-radius: 50%;
            box-shadow: 0 0 12px #34d399;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes gradient-shift {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(45deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .container {
                padding: 3rem 2rem;
                margin: 0 1rem;
            }
            h1 { font-size: 3rem; }
            p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-pill">
            <div class="status-dot"></div>
            Online & Ready
        </div>
        <h1>Hello World</h1>
        <p>Seu ambiente está pronto para o deploy.</p>
    </div>
</body>
</html>
